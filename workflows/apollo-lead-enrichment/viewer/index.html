<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cold-lead viewer</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c232d; --line:#283040;
    --ink:#e6edf3; --dim:#8b949e; --accent:#4c8dff; --good:#3fb950;
    --warn:#d29922; --mute:#6e7681; --pill:#21262d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{padding:16px 20px;border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{font-size:16px;margin:0;font-weight:600}
  header .sub{color:var(--dim);font-size:12px}
  header .spacer{flex:1}
  button.refresh{background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px}
  button.refresh:hover{border-color:var(--accent)}
  .stats{display:flex;gap:10px;padding:14px 20px;flex-wrap:wrap}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:10px 14px;min-width:110px}
  .tile .n{font-size:22px;font-weight:600;line-height:1.1}
  .tile .l{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .tile.good .n{color:var(--good)} .tile.warn .n{color:var(--warn)}
  .filters{display:flex;gap:8px;padding:0 20px 14px;flex-wrap:wrap;align-items:center}
  .filters input,.filters select{background:var(--panel);color:var(--ink);
    border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-size:13px}
  .filters input[type=search]{min-width:220px}
  .filters label{font-size:12px;color:var(--dim);display:flex;gap:6px;align-items:center}
  .wrap{padding:0 20px 40px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{position:sticky;top:0;background:var(--panel2);color:var(--dim);font-weight:600;
    font-size:11px;text-transform:uppercase;letter-spacing:.03em;z-index:1}
  tr.lead{cursor:pointer}
  tr.lead:hover{background:var(--panel)}
  td.firm{white-space:normal;max-width:260px}
  td.firm small{color:var(--dim);display:block}
  .score{display:inline-block;min-width:34px;text-align:center;border-radius:5px;
    padding:2px 6px;font-weight:600;font-size:12px}
  .pill{display:inline-block;border-radius:20px;padding:2px 9px;font-size:11px;
    background:var(--pill);color:var(--dim);border:1px solid var(--line)}
  .pill.verified{color:var(--good);border-color:#20402a}
  .pill.unrevealed{color:var(--mute)}
  .pill.guessed,.pill.unknown{color:var(--warn)}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .email.masked{color:var(--mute);font-style:italic}
  .detail td{background:#0b0f14;white-space:normal}
  .detail pre{margin:0;font:12px/1.5 ui-monospace,SFMono-Regular,Consolas,monospace;
    color:#c9d1d9;max-height:280px;overflow:auto;background:#0d1117;
    border:1px solid var(--line);border-radius:6px;padding:10px}
  .detail .reasons{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .reasons .r{background:var(--panel);border:1px solid var(--line);border-radius:6px;
    padding:4px 10px;font-size:12px}
  .empty{padding:40px;text-align:center;color:var(--dim)}
  .pager{display:flex;gap:10px;align-items:center;padding:14px 0;color:var(--dim);font-size:13px}
  .pager button{background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:6px;padding:5px 12px;cursor:pointer}
  .pager button:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>
<header>
  <h1>Cold-lead viewer</h1>
  <span class="sub" id="dbnote">read-only view of cold_outreach.gms_leads_enriched</span>
  <span class="spacer"></span>
  <span class="sub" id="err" style="color:#f85149"></span>
  <button class="refresh" onclick="loadAll()">Refresh</button>
</header>

<div class="stats" id="stats"></div>

<div class="filters">
  <input type="search" id="q" placeholder="firm, domain, name, title..." oninput="debounced()">
  <label>Min score
    <select id="min_score" onchange="reload()">
      <option value="">any</option><option value="40">40+</option>
      <option value="60">60+</option><option value="80">80+</option><option value="100">100</option>
    </select>
  </label>
  <label>Status
    <select id="status" onchange="reload()">
      <option value="">all</option><option value="verified">verified (revealed)</option>
      <option value="unrevealed">unrevealed</option><option value="guessed">guessed</option>
      <option value="no_contact_found">no contact</option><option value="unknown">unknown</option>
    </select>
  </label>
  <label>Run
    <select id="run_id" onchange="reload()"><option value="">all runs</option></select>
  </label>
  <label>Sort
    <select id="sort" onchange="reload()">
      <option value="score">score</option><option value="newest">newest</option>
      <option value="oldest">oldest</option><option value="firm">firm</option>
    </select>
  </label>
  <label><input type="checkbox" id="revealed" onchange="reload()"> revealed only</label>
</div>

<div class="wrap">
  <table>
    <thead><tr>
      <th>Score</th><th>Firm</th><th>Contact</th><th>Title</th>
      <th>Email</th><th>Status</th><th>Industry</th><th>Run</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="empty" class="empty" hidden>No leads match these filters.</div>
  <div class="pager" id="pager"></div>
</div>

<script>
const TOKEN = new URLSearchParams(location.search).get("token") || "";
const tok = p => TOKEN ? (p + (p.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(TOKEN)) : p;
let offset = 0, limit = 100, lastTotal = 0;

function scoreColor(s){
  s = s || 0;
  if (s >= 80) return "background:#12331d;color:#3fb950";
  if (s >= 60) return "background:#2b2410;color:#d29922";
  if (s >= 40) return "background:#20232b;color:#c9d1d9";
  return "background:#191d24;color:#6e7681";
}
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function getJSON(url){
  const r = await fetch(tok(url));
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}

async function loadStats(){
  const d = await getJSON("/api/stats");
  const s = d.stats || {};
  const tiles = [
    ["total_leads","Leads",""],
    ["distinct_firms","Firms",""],
    ["revealed","Revealed","good"],
    ["credits_this_month","Credits (mo)","warn"],
    ["unrevealed","Unrevealed",""],
    ["avg_score","Avg score",""],
    ["max_score","Top score",""],
  ];
  document.getElementById("stats").innerHTML = tiles.map(([k,l,c])=>
    `<div class="tile ${c}"><div class="n">${s[k]??0}</div><div class="l">${l}</div></div>`).join("");
  const sel = document.getElementById("run_id"), cur = sel.value;
  sel.innerHTML = '<option value="">all runs</option>' + (d.runs||[]).map(r=>
    `<option value="${r.id}">#${r.id} ${esc(r.vertical||"")} (${r.lead_count})</option>`).join("");
  sel.value = cur;
}

function qstr(){
  const p = new URLSearchParams();
  for(const id of ["q","min_score","status","run_id","sort"]){
    const v = document.getElementById(id).value; if(v) p.set(id,v);
  }
  if(document.getElementById("revealed").checked) p.set("revealed","1");
  p.set("limit",limit); p.set("offset",offset);
  return p.toString();
}

async function loadLeads(){
  const d = await getJSON("/api/leads?"+qstr());
  lastTotal = d.total;
  const tb = document.getElementById("rows"); tb.innerHTML = "";
  document.getElementById("empty").hidden = d.rows.length>0;
  for(const r of d.rows){
    const tr = document.createElement("tr");
    tr.className = "lead"; tr.onclick = ()=>toggle(tr, r.id);
    const name = [r.first_name,r.last_name].filter(Boolean).join(" ") || '<span style="color:var(--mute)">—</span>';
    const li = r.person_linkedin_url || r.linkedin_url;
    const emailCell = r.email
      ? `<a href="mailto:${esc(r.email)}">${esc(r.email)}</a>`
      : `<span class="email masked">masked</span>`;
    tr.innerHTML =
      `<td><span class="score" style="${scoreColor(r.icp_score)}">${r.icp_score??0}</span></td>`+
      `<td class="firm"><strong>${esc(r.firm_name||r.canonical_domain||"—")}</strong>`+
        `<small>${esc(r.canonical_domain||"")}</small></td>`+
      `<td>${name}${li?` · <a href="${esc(li)}" target="_blank" rel="noopener">in</a>`:""}</td>`+
      `<td>${esc(r.title||"")}<br><small style="color:var(--dim)">${esc(r.seniority||"")}</small></td>`+
      `<td>${emailCell}</td>`+
      `<td><span class="pill ${esc(r.email_status||"")}">${esc(r.email_status||"—")}</span></td>`+
      `<td>${esc(r.industry||r.practice_area||"")}</td>`+
      `<td><span class="pill">#${r.run_id??"—"}</span></td>`;
    tb.appendChild(tr);
  }
  renderPager();
}

async function toggle(tr, id){
  if(tr.nextSibling && tr.nextSibling.classList && tr.nextSibling.classList.contains("detail")){
    tr.nextSibling.remove(); return;
  }
  const d = await getJSON("/api/lead?id="+id);
  const reasons = d.icp_reasons && typeof d.icp_reasons==="object"
    ? Object.entries(d.icp_reasons).map(([k,v])=>`<span class="r">${esc(k)}: <b>${esc(typeof v==="object"?JSON.stringify(v):v)}</b></span>`).join("")
    : "";
  const det = document.createElement("tr");
  det.className = "detail";
  det.innerHTML = `<td colspan="8">
     ${reasons?`<div class="reasons">${reasons}</div>`:""}
     <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
       <div><div style="color:var(--dim);font-size:11px;margin-bottom:4px">ORG PAYLOAD</div>
         <pre>${esc(JSON.stringify(d.apollo_org_payload,null,2))}</pre></div>
       <div><div style="color:var(--dim);font-size:11px;margin-bottom:4px">PERSON PAYLOAD</div>
         <pre>${esc(JSON.stringify(d.apollo_person_payload,null,2))}</pre></div>
     </div></td>`;
  tr.after(det);
}

function renderPager(){
  const end = Math.min(offset+limit, lastTotal);
  document.getElementById("pager").innerHTML =
    `<button ${offset<=0?"disabled":""} onclick="page(-1)">Prev</button>`+
    `<span>${lastTotal?offset+1:0}–${end} of ${lastTotal}</span>`+
    `<button ${end>=lastTotal?"disabled":""} onclick="page(1)">Next</button>`;
}
function page(dir){ offset = Math.max(0, offset + dir*limit); loadLeads(); }
function reload(){ offset=0; loadLeads().catch(showErr); }

let t; function debounced(){ clearTimeout(t); t=setTimeout(reload,250); }
function showErr(e){ document.getElementById("err").textContent = e.message||e; }
async function loadAll(){
  document.getElementById("err").textContent="";
  try{ await loadStats(); await loadLeads(); }catch(e){ showErr(e); }
}
loadAll();
</script>
</body>
</html>
